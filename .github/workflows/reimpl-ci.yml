name: Reimpl CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test-with-sdl2:
    name: ${{ matrix.os }} - SDL2 - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    env:
      COMIC2_REQUIRE_ORIGINAL_ASSETS: ${{ vars.COMIC2_REQUIRE_ORIGINAL_ASSETS || '0' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-2022]
        build_type: [Debug, Release]

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y cmake g++ libsdl2-dev pkg-config

      - name: Setup Sound Linux
        if: runner.os == 'Linux'
        uses: LABSN/sound-ci-helpers@v1

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake sdl2 pkg-config

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path 'C:\vcpkg\vcpkg.exe')) {
            git clone https://github.com/microsoft/vcpkg C:\vcpkg
            & C:\vcpkg\bootstrap-vcpkg.bat
          }
          & C:\vcpkg\vcpkg.exe install sdl2 --triplet x64-windows-static

      - name: Configure CMake (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -S . -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Configure CMake (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build -S . -G "Visual Studio 17 2022" -A x64 -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build
        run: |
          cmake --build build --config ${{ matrix.build_type }}

      - name: Run tests
        working-directory: build
        env:
          SDL_AUDIODRIVER: dummy
          SDL_VIDEODRIVER: dummy
        run: |
          ctest --output-on-failure --build-config ${{ matrix.build_type }}

      - name: Run renderer demo (headless verification) (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: build
        env:
          SDL_VIDEODRIVER: dummy
        run: |
          ./comic2_renderer_demo

      - name: Run renderer demo (headless verification) (Windows)
        if: runner.os == 'Windows'
        working-directory: build
        env:
          SDL_VIDEODRIVER: dummy
        shell: pwsh
        run: |
          & ".\${{ matrix.build_type }}\comic2_renderer_demo.exe"
